{% extends 'partials/base.html' %} {% block content %}
<section class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white text-center py-4">
                    <h4 class="fw-bold mb-0"><i class="fas fa-hospital-symbol me-2"></i>Gracie Hospital</h4>
                    <p class="small mb-0 mt-1">Set New Password — Step 3 of 3</p>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted small text-center mb-4">OTP verified! Now enter your new password below.</p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" name="new_password" class="form-control" placeholder="Enter new password (min 6 characters)" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" name="confirm_password" class="form-control" placeholder="Re-enter new password" required />
                        </div>
                        {% for message in messages %}
                        <div class="alert alert-{{message.tags}} small">{{message}}</div>
                        {% endfor %}
                        <button type="submit" class="btn btn-success w-100 fw-bold">
                            <i class="fas fa-lock me-2"></i>Reset Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock content %}
