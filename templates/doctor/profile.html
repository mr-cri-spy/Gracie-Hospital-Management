{% extends 'partials/base.html' %} {% block content %}
<section class="pt-5 pb-5">
    <div class="container">
        <div class="row mt-0 mt-md-4">
            {% include 'doctor/sidebar.html' %}
            <div class="col-lg-9 col-md-8 col-12">
                <h4 class="mb-4 fw-bold">My Profile</h4>
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white fw-bold">
                        <i class="fas fa-user-md me-2"></i>Doctor Profile — Gracie Hospital, Mysore
                    </div>
                    <div class="card-body">
                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" name="full_name" value="{{doctor.full_name}}" class="form-control" />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Mobile (India)</label>
                                    <div class="input-group">
                                        <span class="input-group-text">🇮🇳 +91</span>
                                        <input type="text" name="mobile" value="{{doctor.mobile}}" class="form-control" placeholder="98765 43210" />
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Specialization</label>
                                    <input type="text" name="specialization" value="{{doctor.specialization}}" class="form-control" />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Qualifications</label>
                                    <input type="text" name="qualifications" value="{{doctor.qualifications}}" class="form-control" placeholder="MBBS, MD, MS etc." />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Years of Experience</label>
                                    <input type="text" name="years_of_experience" value="{{doctor.years_of_experience}}" class="form-control" />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">KMC Registration No.</label>
                                    <input type="text" name="registration_number" value="{{doctor.registration_number}}" class="form-control" placeholder="Karnataka Medical Council No." />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">City</label>
                                    <input type="text" name="city" value="{{doctor.city|default:'Mysore'}}" class="form-control" />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">State</label>
                                    <input type="text" name="state" value="{{doctor.state|default:'Karnataka'}}" class="form-control" />
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Bio</label>
                                    <textarea name="bio" class="form-control" rows="3">{{doctor.bio}}</textarea>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Next Available Date</label>
                                    <input type="datetime-local" name="next_available_appointment_date"
                                           value="{{doctor.next_available_appointment_date|date:'Y-m-d\TH:i'}}"
                                           class="form-control" />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Profile Photo</label>
                                    <input type="file" name="image" class="form-control" accept="image/*" />
                                </div>
                                <div class="col-12">
                                    <button type="submit" class="btn btn-success px-5">
                                        <i class="fas fa-save me-2"></i>Save Profile
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock content %}
